<!DOCTYPE html>
<html>
<head>
    <title>Health Recommendations</title>
</head>
<body>
    <h1>Choose an Option</h1>
    <form action="/nutrition" method="post">
        <h2>Nutrition Recommendation</h2>
        Blood Sugar Level: <input type="text" name="blood_sugar"><br>
        Dietary Preference: <input type="text" name="nutrition_type"><br>
        <input type="submit" value="Get Recommendation">
    </form>
    <br>
    <form action="/insulin" method="post">
        <h2>Insulin Dosage Recommendation</h2>
        Blood Sugar Level: <input type="text" name="blood_sugar"><br>
        Insulin Type: <input type="text" name="insulin_type"><br>
        <input type="submit" value="Get Dosage">
    </form>
</body>
</html>
