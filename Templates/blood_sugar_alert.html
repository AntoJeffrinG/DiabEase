<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugar Alert</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/styles.css"> <!-- Link to your main CSS file -->
    <script>
        // JavaScript for phone number validation
        document.addEventListener("DOMContentLoaded", function () {
            const phoneInput = document.getElementById('phone_number');
            phoneInput.addEventListener('input', function () {
                this.value = this.value.replace(/[^0-9]/g, ''); // Allow only numbers
                if (this.value.length > 10) this.value = this.value.slice(0, 10); // Limit to 10 digits for Indian numbers
            });
        });
    </script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/services">Services</a></li>
        </ul>
    </nav>

    <!-- Blood Sugar Alert Section -->
    <section class="blood-sugar-alert-section">
        <div class="content">
            <h1 class="heading">Blood Sugar Alert System</h1>
            <form action="/send_alert" method="POST" class="form-style">
                <!-- Name Field -->
                <div class="input-group">
                    <label for="name">Name:</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required autocomplete="off">
                </div>
                
                <!-- Phone Number Field -->
                <div class="input-group">
                    <label for="phone_number">Phone Number (without country code if in India):</label>
                    <input type="text" class="form-control" id="phone_number" name="phone_number" placeholder="Enter your phone number" maxlength="10" required autocomplete="off">
                </div>
                
                <!-- Low Blood Sugar Range -->
                <div class="input-group">
                    <label for="low_range">Low Blood Sugar Range (mg/dL):</label>
                    <select class="form-control" id="low_range" name="low_range" required>
                        <option value="" disabled selected>Select Low Range</option>
                        <option value="60">60</option>
                        <option value="70">70</option>
                        <option value="80">80</option>
                    </select>
                </div>
                
                <!-- High Blood Sugar Range -->
                <div class="input-group">
                    <label for="high_range">High Blood Sugar Range (mg/dL):</label>
                    <select class="form-control" id="high_range" name="high_range" required>
                        <option value="" disabled selected>Select High Range</option>
                        <option value="120">120</option>
                        <option value="140">140</option>
                        <option value="160">160</option>
                    </select>
                </div>
                
                <!-- Current Blood Sugar Level -->
                <div class="input-group">
                    <label for="current_sugar_level">Current Blood Sugar Level (mg/dL):</label>
                    <input type="number" class="form-control" id="current_sugar_level" name="current_sugar_level" placeholder="Enter current blood sugar level" required autocomplete="off">
                </div>

                <!-- Submit Button -->
                <button type="submit" class="button colorful-hover">Submit</button>
            </form>
        </div>
    </section>
</body>
</html>
